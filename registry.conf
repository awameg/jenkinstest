server {
    listen 80 default_server;
    server_name docker.awameg.ru;
    
    location /.well-known {
        root /opt/www/acme;
    }

    location / {
    return 301 https://docker.awameg.ru;
    }    
}

server {
    listen 443 ssl http2;

    access_log /var/log/nginx/docker.access.log;
    error_log /var/log/nginx/docker.error.log error;
    
    ssl_certificate /opt/www/acme/docker.awameg.ru/fullchain.pem;
    ssl_certificate_key /opt/www/acme/docker.awameg.ru/privkey.pem;

    location / {
        proxy_pass http://registry:5000/;

        # return 201 "test21";
    }
}
